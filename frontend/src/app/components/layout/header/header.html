<header>
  <div class="header-content">
    <h1 routerLink="/">Dungeon Mapster</h1>
    <nav>
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
      @if (!currentUser) {
        <a routerLink="/demo" routerLinkActive="active">Demo</a>
      }
      @if (currentUser) {
        <a routerLink="/maps" routerLinkActive="active">My Maps</a>
      }
    </nav>

    <div class="header-actions">
      @if (showDmAdmin) {
        <button class="header-btn header-btn-admin" [class.active]="dmAdminActive" (click)="onDmAdminClick()">
          🛡️ <span class="btn-label">DM Admin</span>
        </button>
      }
      @if (currentUser) {
        <div class="user-info">
          @if (currentUser.profilePictureUrl) {
            <img [src]="currentUser.profilePictureUrl" alt="{{ currentUser.name }}" class="user-avatar"/>
          }
          <span class="user-name">{{ currentUser.name }}</span>
        </div>
        <button (click)="logout()" class="btn btn-secondary">Logout</button>
      } @else {
        <button (click)="login()" class="login-btn">Login with Google</button>
      }
    </div>
  </div>
</header>
